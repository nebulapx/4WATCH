<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Movies — 4 Watch</title>
    <meta name="description" contendist="Browse all movies on 4 Watch." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style/style.css" />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark">
      <div class="container-fluid">
        <a class="navbar-brand" href="index.html">4 Watch</a>
        <button
          class="navbar-toggler border-0"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#mainNav"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="mainNav">
          <ul class="navbar-nav mx-auto gap-3">
            <li class="nav-item">
              <a class="nav-link" href="index.html">Home</a>
            </li>
            <li class="nav-item">
              <a class="nav-link active" href="movies.html">Movies</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="tvshows.html">TV Shows</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="kdrama.html">K-Drama</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="genres.html">Genres</a>
            </li>
          </ul>
          <div class="d-flex align-items-center gap-3 mt-3 mt-lg-0">
            <form id="searchForm" class="d-flex m-0">
              <input
                id="searchInput"
                type="text"
                class="nav-search d-none d-lg-block"
                placeholder="Search movies..."
              />
            </form>
            <div class="nav-avatar">U</div>
          </div>
        </div>
      </div>
    </nav>

    <div class="container">
      <div class="page-header">
        <h1 id="pageTitle">🎬 Movies</h1>
        <p id="pageDesc">
          Explore our full collection of movies — from blockbusters to hidden
          gems.
        </p>
      </div>
      <div class="filter-bar" id="filterBar">
        <button class="filter-btn active" data-genre="all">All</button>
        <button class="filter-btn" data-genre="action">Action</button>
        <button class="filter-btn" data-genre="comedy">Comedy</button>
        <button class="filter-btn" data-genre="drama">Drama</button>
        <button class="filter-btn" data-genre="horror">Horror</button>
        <button class="filter-btn" data-genre="sci-fi">Sci-Fi</button>
        <button class="filter-btn" data-genre="thriller">Thriller</button>
        <button class="filter-btn" data-genre="romance">Romance</button>
        <button class="filter-btn" data-genre="fantasy">Fantasy</button>
        <button class="filter-btn" data-genre="crime">Crime</button>
      </div>

      <div class="movie-grid" id="movieGrid"></div>
      <div class="no-results" id="noResults" style="display: none">
        <i class="fas fa-film"></i>
        No movies found for this genre.
      </div>
    </div>

    <footer>
      <div class="container text-center">
        <div class="footer-brand">4 Watch</div>
        <div class="footer-bottom">© 2026 4 Watch. All rights reserved.</div>
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      const movies = [
        {
          title: "Inception",
          year: "2010",
          genre: "sci-fi",
          rating: "9.3",
          img: "https://image.tmdb.org/t/p/w500/8IB2e4r4oVhHnANbnm7O3Tj6tF8.jpg",
        },
        {
          title: "Interstellar",
          year: "2014",
          genre: "sci-fi",
          rating: "9.1",
          img: "assets/images/interstellar.jpg",
        },
        {
          title: "The Dark Knight",
          year: "2008",
          genre: "action",
          rating: "9.0",
          img: "https://image.tmdb.org/t/p/w500/qJ2tW6WMUDux911r6m7haRef0WH.jpg",
        },
        {
          title: "Daredevil",
          year: "2015",
          genre: "action",
          rating: "8.6",
          img: "https://image.tmdb.org/t/p/w500/QWbPaDxiB6LW2LjASknzYBvjMj.jpg",
        },
        {
          title: "Breaking Bad",
          year: "2008",
          genre: "crime",
          rating: "9.5",
          img: "https://image.tmdb.org/t/p/w500/ggFHVNu6YYI5L9pCfOacjizRGt.jpg",
        },
        {
          title: "Stranger Things",
          year: "2016",
          genre: "horror",
          rating: "8.7",
          img: "https://image.tmdb.org/t/p/w500/x2LSRK2Cm7MZhjluni1msVJ3wDF.jpg",
        },
        {
          title: "Peaky Blinders",
          year: "2013",
          genre: "drama",
          rating: "8.8",
          img: "https://image.tmdb.org/t/p/w500/vUUqzWa2LnHIVqkaKVlVGkVcZIW.jpg",
        },
        {
          title: "The Witcher",
          year: "2019",
          genre: "fantasy",
          rating: "8.2",
          img: "https://image.tmdb.org/t/p/w500/7vjaCdMw15FEbXyLQTVa04URsPm.jpg",
        },
        {
          title: "Narcos",
          year: "2015",
          genre: "crime",
          rating: "8.8",
          img: "https://image.tmdb.org/t/p/w500/rTmal9fDbwh5F0waol2hq35U4ah.jpg",
        },
        {
          title: "Lucifer",
          year: "2016",
          genre: "fantasy",
          rating: "8.1",
          img: "https://image.tmdb.org/t/p/w500/ekZobS8isE6mA53RAiGDG93hBxL.jpg",
        },
        {
          title: "You",
          year: "2018",
          genre: "thriller",
          rating: "7.7",
          img: "assets/images/you.jpg",
        },
        {
          title: "Jessica Jones",
          year: "2015",
          genre: "action",
          rating: "7.5",
          img: "assets/images/jessicajones.jpg",
        },
        {
          title: "Comic 8",
          year: "2014",
          genre: "comedy",
          rating: "8.0",
          img: "assets/images/comic8.jpg",
        },
      ];
      const grid = document.getElementById("movieGrid");
      const noResults = document.getElementById("noResults");
      const pageTitle = document.getElementById("pageTitle");
      const pageDesc = document.getElementById("pageDesc");

      function renderMovies(genre) {
        const filtered =
          genre === "all" ? movies : movies.filter((m) => m.genre === genre);
        grid.innerHTML = "";
        if (filtered.length === 0) {
          noResults.style.display = "block";
          return;
        }
        noResults.style.display = "none";
        filtered.forEach((m) => {
          grid.innerHTML += `
            <div class="movie-card" onclick="alert('${m.title} selected!')">
              <img src="${m.img}" alt="${m.title}"/>
              <span class="card-rating"><i class="fas fa-star"></i> ${m.rating}</span>
              <div class="card-overlay"><div class="overlay-play"><i class="fas fa-play"></i></div></div>
              <div class="movie-info">
                <div class="movie-title">${m.title}</div>
                <div class="movie-meta"><span>${m.year}</span><span>•</span><span>${m.genre.charAt(0).toUpperCase() + m.genre.slice(1)}</span></div>
              </div>
            </div>`;
        });
      }

      // Read genre from URL
      const params = new URLSearchParams(window.location.search);
      const urlGenre = params.get("genre");
      let activeGenre = "all";

      if (urlGenre) {
        activeGenre = urlGenre.toLowerCase();
        const label =
          activeGenre.charAt(0).toUpperCase() + activeGenre.slice(1);
        pageTitle.textContent = "🎬 " + label + " Movies";
        pageDesc.textContent = "Showing all movies in the " + label + " genre.";
      }

      // Set active filter button
      document.querySelectorAll(".filter-btn").forEach((btn) => {
        btn.classList.remove("active");
        if (btn.dataset.genre === activeGenre) btn.classList.add("active");
        btn.addEventListener("click", () => {
          document
            .querySelectorAll(".filter-btn")
            .forEach((b) => b.classList.remove("active"));
          btn.classList.add("active");
          const g = btn.dataset.genre;
          renderMovies(g);
          if (g === "all") {
            pageTitle.textContent = "🎬 Movies";
            pageDesc.textContent =
              "Explore our full collection of movies — from blockbusters to hidden gems.";
          } else {
            const l = g.charAt(0).toUpperCase() + g.slice(1);
            pageTitle.textContent = "🎬 " + l + " Movies";
            pageDesc.textContent = "Showing all movies in the " + l + " genre.";
          }
        });
      });

      renderMovies(activeGenre);

      // --- Implementasi DOM, Event, Function, dan Form Handling ---

      // DOM = Mengakses HTML
      const searchForm = document.getElementById("searchForm");
      const searchInput = document.getElementById("searchInput");

      // Function = Menjalankan perintah
      function handleMovieSearch(event) {
        // Event = Menangkap aksi user (submit form)
        event.preventDefault();

        // Form handling = Mengatur input user
        const keyword = searchInput.value.trim();

        if (keyword === "") {
          alert("Form kosong! Masukkan judul film untuk mencari.");
        } else {
          alert(`Fitur pencarian sedang memproses kata kunci: "${keyword}"`);
          searchInput.value = ""; // Mengosongkan form setelah submit
        }
      }

      // Event Listener
      if (searchForm) {
        searchForm.addEventListener("submit", handleMovieSearch);
      }
    </script>
  </body>
</html>
