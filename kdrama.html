<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>K-Drama — 4 Watch</title>
    <meta
      name="description"
      content="Browse popular Korean Dramas on 4 Watch."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style/style.css" />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark">
      <div class="container-fluid">
        <a class="navbar-brand" href="index.html">4 Watch</a>
        <button
          class="navbar-toggler border-0"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#mainNav"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="mainNav">
          <ul class="navbar-nav mx-auto gap-3">
            <li class="nav-item">
              <a class="nav-link" href="index.html">Home</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="movies.html">Movies</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="tvshows.html">TV Shows</a>
            </li>
            <li class="nav-item">
              <a class="nav-link active" href="kdrama.html">K-Drama</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="genres.html">Genres</a>
            </li>
          </ul>
          <div class="d-flex align-items-center gap-3 mt-3 mt-lg-0">
            <form id="searchForm" class="d-flex m-0">
              <input
                id="searchInput"
                type="text"
                class="nav-search d-none d-lg-block"
                placeholder="Search K-Dramas..."
              />
            </form>
            <div class="nav-avatar">U</div>
          </div>
        </div>
      </div>
    </nav>

    <div class="container">
      <div class="page-header">
        <h1 id="pageTitle">🇰🇷 K-Dramas</h1>
        <p id="pageDesc">
          Explore our collection of the most popular and recent Korean Dramas.
        </p>
      </div>
      <div class="filter-bar" id="filterBar">
        <button class="filter-btn active" data-genre="all">All</button>
        <button class="filter-btn" data-genre="romance">Romance</button>
        <button class="filter-btn" data-genre="action">Action</button>
        <button class="filter-btn" data-genre="thriller">Thriller</button>
        <button class="filter-btn" data-genre="comedy">Comedy</button>
        <button class="filter-btn" data-genre="drama">Drama</button>
        <button class="filter-btn" data-genre="fantasy">Fantasy</button>
      </div>

      <div class="movie-grid" id="movieGrid"></div>
      <div class="no-results" id="noResults" style="display: none">
        <i class="fas fa-video-slash"></i>
        No K-Dramas found for this genre.
      </div>
    </div>

    <footer>
      <div class="container text-center">
        <div class="footer-brand">4 Watch</div>
        <div class="footer-bottom">© 2026 4 Watch. All rights reserved.</div>
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      const shows = [
        {
          title: "Queen of Tears",
          year: "2024",
          genre: "romance",
          rating: "9.0",
          img: "assets/images/queen-of-tears.jpg",
        },
        {
          title: "Moving",
          year: "2023",
          genre: "action",
          rating: "8.9",
          img: "assets/images/moving.jpg",
        },
        {
          title: "The Glory",
          year: "2022",
          genre: "thriller",
          rating: "8.8",
          img: "assets/images/the-glory.jpg",
        },
        {
          title: "Crash Landing on You",
          year: "2019",
          genre: "romance",
          rating: "8.7",
          img: "assets/images/cloy.jpg",
        },
        {
          title: "Vincenzo",
          year: "2021",
          genre: "action",
          rating: "8.4",
          img: "assets/images/vincenzo.jpg",
        },
        {
          title: "Goblin",
          year: "2016",
          genre: "fantasy",
          rating: "8.6",
          img: "assets/images/goblin.jpg",
        },
        {
          title: "Squid Game",
          year: "2021",
          genre: "thriller",
          rating: "8.0",
          img: "assets/images/squidgame.jpg",
        },
        {
          title: "Reply 1988",
          year: "2015",
          genre: "comedy",
          rating: "9.1",
          img: "assets/images/reply-1988.jpg",
        },
        {
          title: "Hospital Playlist",
          year: "2020",
          genre: "drama",
          rating: "8.9",
          img: "assets/images/hospital-playlist.jpg",
        },
        {
          title: "Alchemy of Souls",
          year: "2022",
          genre: "fantasy",
          rating: "8.8",
          img: "assets/images/alchemy-of-souls.jpg",
        },
        {
          title: "My Name",
          year: "2021",
          genre: "action",
          rating: "7.8",
          img: "assets/images/my-name.jpg",
        },
        {
          title: "Business Proposal",
          year: "2022",
          genre: "comedy",
          rating: "8.1",
          img: "assets/images/business-proposal.jpg",
        },
      ];

      const grid = document.getElementById("movieGrid");
      const noResults = document.getElementById("noResults");
      const pageTitle = document.getElementById("pageTitle");
      const pageDesc = document.getElementById("pageDesc");

      function renderShows(genre) {
        const filtered =
          genre === "all" ? shows : shows.filter((m) => m.genre === genre);
        grid.innerHTML = "";
        if (filtered.length === 0) {
          noResults.style.display = "block";
          return;
        }
        noResults.style.display = "none";
        filtered.forEach((m) => {
          // Adding fallback image just in case local assets aren't downloaded yet
          const fallbackImage = `https://via.placeholder.com/500x750/111827/00ffc3?text=${encodeURIComponent(m.title)}`;
          grid.innerHTML += `
            <div class="movie-card" onclick="alert('${m.title} selected!')">
              <img src="${m.img}" alt="${m.title}" onerror="this.onerror=null; this.src='${fallbackImage}';" />
              <span class="card-rating"><i class="fas fa-star"></i> ${m.rating}</span>
              <div class="card-overlay"><div class="overlay-play"><i class="fas fa-play"></i></div></div>
              <div class="movie-info">
                <div class="movie-title" title="${m.title}">${m.title}</div>
                <div class="movie-meta"><span>${m.year}</span><span>•</span><span>${m.genre.charAt(0).toUpperCase() + m.genre.slice(1)}</span></div>
              </div>
            </div>`;
        });
      }

      const params = new URLSearchParams(window.location.search);
      const urlGenre = params.get("genre");
      let activeGenre = "all";

      if (urlGenre) {
        activeGenre = urlGenre.toLowerCase();
        const label =
          activeGenre.charAt(0).toUpperCase() + activeGenre.slice(1);
        pageTitle.textContent = "🇰🇷 " + label + " K-Dramas";
        pageDesc.textContent =
          "Showing all K-Dramas in the " + label + " genre.";
      }

      document.querySelectorAll(".filter-btn").forEach((btn) => {
        btn.classList.remove("active");
        if (btn.dataset.genre === activeGenre) btn.classList.add("active");
        btn.addEventListener("click", () => {
          document
            .querySelectorAll(".filter-btn")
            .forEach((b) => b.classList.remove("active"));
          btn.classList.add("active");
          const g = btn.dataset.genre;
          renderShows(g);
          if (g === "all") {
            pageTitle.textContent = "🇰🇷 K-Dramas";
            pageDesc.textContent =
              "Explore our collection of the most popular and recent Korean Dramas.";
          } else {
            const l = g.charAt(0).toUpperCase() + g.slice(1);
            pageTitle.textContent = "🇰🇷 " + l + " K-Dramas";
            pageDesc.textContent =
              "Showing all K-Dramas in the " + l + " genre.";
          }
        });
      });

      renderShows(activeGenre);

      // --- Implementasi DOM, Event, Function, dan Form Handling ---

      // DOM = Mengakses HTML
      const searchForm = document.getElementById("searchForm");
      const searchInput = document.getElementById("searchInput");

      // Function = Menjalankan perintah
      function handleShowSearch(event) {
        // Event = Menangkap aksi user (submit form)
        event.preventDefault();

        // Form handling = Mengatur input user
        const keyword = searchInput.value.trim();

        if (keyword === "") {
          alert("Form kosong! Masukkan judul K-Drama untuk mencari.");
        } else {
          alert(`Fitur pencarian sedang memproses kata kunci: "${keyword}"`);
          searchInput.value = ""; // Mengosongkan form setelah submit
        }
      }

      // Event Listener
      if (searchForm) {
        searchForm.addEventListener("submit", handleShowSearch);
      }
    </script>
  </body>
</html>
